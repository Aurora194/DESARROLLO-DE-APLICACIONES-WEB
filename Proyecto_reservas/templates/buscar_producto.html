{% extends "base.html" %}
{% block content %}

<h2>Buscar Producto</h2>

<form method="POST">
    <input type="text" name="texto" placeholder="Ingrese nombre o descripción">
    <input type="submit" value="Buscar">
</form>

{% if resultados %}
<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Cantidad</th>
        <th>Precio</th>
    </tr>

    {% for p in resultados %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>${{ p[4] }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

{% endblock %}
