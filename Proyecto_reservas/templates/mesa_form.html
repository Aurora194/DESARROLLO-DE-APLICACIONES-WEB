{% extends "base.html" %}
{% block title %}Nueva Mesa{% endblock %}

{% block content %}

<div class="container mt-5">
<div class="card shadow p-4">

<h2 class="mb-4 text-center">Registrar Nueva Mesa</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" placeholder="Ej: Mesa 1" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <input type="text" name="descripcion" class="form-control" placeholder="Ej: Mesa para 4 personas" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Ubicación</label>
        <input type="text" name="ubicacion" class="form-control" placeholder="Ej: Terraza" required>
    </div>

    <div class="d-flex justify-content-center gap-3 mt-4">
        <button type="submit" class="btn btn-success px-4">
            💾 Guardar Mesa
        </button>

        <a href="{{ url_for('mesas') }}" class="btn btn-outline-secondary px-4">
            ↩ Cancelar
        </a>
    </div>

</form>

</div>
</div>

{% endblock %}
