{% extends "base.html" %}
{% block content %}

<h2>Buscar Reserva</h2>

<form method="POST">
    <input type="text" name="texto" placeholder="Ingrese nombre o email">
    <input type="submit" value="Buscar">
</form>

{% if resultados %}
<table>
    <tr>
        <th>ID</th>
        <th>Nombre Completo</th>
        <th>Email</th>
        <th>Celular</th>
        <th>Fecha Reserva</th>
        <th>Personas</th>
    </tr>

    {% for p in resultados %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>{{ p[4] }}</td>
        <td>{{ p[5] }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

{% endblock %}
