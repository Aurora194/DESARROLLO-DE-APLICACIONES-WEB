{% extends "base.html" %}
{% block content %}

<h2>Editar Producto</h2>

<form method="POST">
    {{ form.hidden_tag() }}
    <p>{{ form.nombre.label }} {{ form.nombre() }}</p>
    <p>{{ form.cantidad.label }} {{ form.cantidad() }}</p>
    <p>{{ form.precio.label }} {{ form.precio() }}</p>
    <p>{{ form.submit(class="btn") }}</p>
</form>

{% endblock %}
