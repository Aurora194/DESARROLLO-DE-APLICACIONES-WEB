<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Reservas{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header>
    <h1>Sistema de Reservas – Restaurante Leña Steak House</h1>
</header>

<nav>
    <a href="{{ url_for('inicio') }}">Inicio</a>
    <a href="{{ url_for('about') }}">Acerca de</a>
    <a href="{{ url_for('reservas') }}">Reservas</a>

    <!-- MENÚ DESPLEGABLE INVENTARIO -->
    <div class="dropdown">
        <a href="#" class="dropbtn">Inventario ▾</a>
        <div class="dropdown-content">
            <a href="{{ url_for('productos_listar') }}">Ver Inventario</a>
            <a href="{{ url_for('producto_nuevo') }}">Añadir Producto</a>
            <a href="{{ url_for('buscar_producto') }}">Buscar Producto</a>
        </div>
    </div>
</nav>

<hr>

<main>
    {% block content %}
    {% endblock %}
</main>

<hr>

<footer>
    <p>© 2026 Sistema de Reservas | Todos los derechos reservados. </p>
</footer>

</body>
</html>
