{% extends "base.html" %}

{% block content %}

<h2>Usuarios</h2>

<a href="{{ url_for('usuario_nuevo') }}" class="btn btn-primary mb-3">
➕ Agregar Nuevo usuario
</a>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Password</th>
<th>Acciones</th>
</tr>

{% for u in usuarios %}

<tr>
<td>{{u.id_usuario}}</td>
<td>{{u.nombre}}</td>
<td>{{u.email}}</td>
<td>********</td>
<td>

<a href="{{ url_for('editar_usuario', id=u.id_usuario) }}" class="btn btn-warning btn-sm">
✏ Editar
</a>

<a href="{{ url_for('eliminar_usuario', id=u.id_usuario) }}" class="btn btn-danger btn-sm">
🗑 Eliminar
</a>

</td>

</tr>

{% else %}

<tr>
<td colspan="5">No hay usuarios registrados</td>
</tr>

{% endfor %}

</table>

{% endblock %}
